{% extends 'base.html' %}
{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h4>
                        Tải lên tài liệu
                    </h4>
                </div>

                <div class="card-body">

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                Tên tài liệu
                            </label>
                            <input type="text"
                                   name="title"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Cấp học
                            </label>

                            <select name="level" class="form-select">
    <option value="Tiểu học">Tiểu học</option>
    <option value="THCS">THCS</option>
    <option value="THPT">THPT</option>
    <option value="Đại học">Đại học</option>
</select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Môn học
                            </label>

                            <input type="text"
                                   name="subject"
                                   class="form-control">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Mô tả
                            </label>

                            <textarea
                                name="description"
                                rows="4"
                                class="form-control">
                            </textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Chọn file
                            </label>

                            <input type="file"
                                   name="file"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Quyền truy cập
                            </label>

                            <select
                                name="permission"
                                class="form-select">

                                <option value="view">
                                    Chỉ xem
                                </option>

                                <option value="download">
                                    Xem và tải xuống
                                </option>

                            </select>

                        </div>

                        <button class="btn btn-success">
                            <i class="bi bi-cloud-upload"></i>
                            Tải lên
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
