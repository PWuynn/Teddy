{% extends 'base.html' %}

{% block title %}Tạo công việc | TEDDY{% endblock %}

{% block content %}
<div class="form-page py-5">
    <div class="container">
        <section class="form-shell">
            <aside class="form-side">
                <span class="form-kicker">Workboard</span>
                <h1>Tạo công việc cá nhân</h1>
                <p>Đặt tiêu đề, mức ưu tiên, hạn hoàn thành và chọn có công khai công việc cho mọi người hay không.</p>
            </aside>

            <section class="form-panel">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Tên công việc</label>
                            <input type="text" name="title" class="form-control form-control-lg" placeholder="Nhập tên công việc..." required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Mô tả công việc</label>
                            <textarea name="description" class="form-control" rows="4" placeholder="Nhập mô tả..."></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Người thực hiện</label>
                            <input type="text" class="form-control" value="{{ user.username }}" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Mức độ quan trọng</label>
                            <select name="priority" class="form-select">
                                <option value="low">Thấp</option>
                                <option value="medium">Trung bình</option>
                                <option value="high">Cao</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Thời hạn hoàn thành</label>
                            <input type="datetime-local" id="deadline" name="deadline" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Thời gian còn lại</label>
                            <div class="countdown-box" id="countdown">Chưa chọn thời hạn</div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="{% url 'todo:todo_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
                        <button class="btn btn-primary btn-lg"><i class="bi bi-save"></i> Lưu công việc</button>
                    </div>
                </form>
            </section>
        </section>
    </div>
</div>

<style>
.form-page{background:#f3f8f6;min-height:calc(100vh - 76px)}.form-shell{display:grid;grid-template-columns:minmax(260px,340px) minmax(0,1fr);gap:22px;align-items:start}.form-side{background:linear-gradient(135deg,#2563eb,#3b82f6);border-radius:8px;color:white;padding:28px;position:sticky;top:96px}.form-kicker{color:#fff;font-size:12px;font-weight:850;letter-spacing:.08em;text-transform:uppercase}.form-side h1{font-size:34px;font-weight:850;letter-spacing:0;margin:10px 0}.form-side p{color:rgba(255,255,255,.78);margin:0}.form-panel{background:white;border:1px solid #dbe8e3;border-radius:8px;box-shadow:0 14px 32px rgba(15,118,110,.08);padding:24px}.countdown-box{align-items:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;color:linear-gradient(135deg,#2563eb,#3b82f6);display:flex;font-weight:800;min-height:48px;padding:10px 14px}.countdown-box.is-expired{background:#fef2f2;border-color:#fecaca;color:#dc2626}.public-switch{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px 14px 14px 48px}.form-actions{display:flex;gap:12px;justify-content:space-between;margin-top:22px}@media(max-width:992px){.form-shell{grid-template-columns:1fr}.form-side{position:static}}@media(max-width:576px){.form-actions{align-items:stretch;flex-direction:column}.form-actions .btn{width:100%}}
</style>

<script>
const deadlineInput = document.getElementById('deadline');
const countdown = document.getElementById('countdown');
let timer;

deadlineInput.addEventListener('change', function() {
    clearInterval(timer);
    timer = setInterval(function() {
        const target = new Date(deadlineInput.value).getTime();
        const now = new Date().getTime();
        const distance = target - now;

        if (distance <= 0) {
            countdown.textContent = 'Đã hết hạn';
            countdown.classList.add('is-expired');
            clearInterval(timer);
            return;
        }

        countdown.classList.remove('is-expired');
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        countdown.textContent = days + ' ngày ' + hours + ' giờ ' + minutes + ' phút ' + seconds + ' giây';
    }, 1000);
});
</script>
{% endblock %}
