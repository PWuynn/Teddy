{% extends 'base.html' %}

{% block title %}
Dashboard Admin
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-danger">Dashboard Admin</h2>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                Làm mới dữ liệu
            </button>
        </form>
    </div>

    <div class="row g-4">

        <div class="col-md-3">
            <div class="card shadow border-0 text-center p-4">
                <h5>Tổng người dùng</h5>
                <h2 class="text-primary">120</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0 text-center p-4">
                <h5>Giáo viên</h5>
                <h2 class="text-success">15</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0 text-center p-4">
                <h5>Học sinh</h5>
                <h2 class="text-warning">95</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow border-0 text-center p-4">
                <h5>Đề kiểm tra</h5>
                <h2 class="text-info">30</h2>
            </div>
        </div>

    </div>

    <div class="card shadow border-0 mt-5">
        <div class="card-header bg-danger text-white">
            Quản trị hệ thống
        </div>

        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-4">
                    <a href="#" class="btn btn-outline-primary w-100">
                        Quản lý người dùng
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="#" class="btn btn-outline-success w-100">
                        Quản lý đề thi
                    </a>
                </div>

                <div class="col-md-4">
                    <a href="#" class="btn btn-outline-dark w-100">
                        Quản lý tài liệu
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
