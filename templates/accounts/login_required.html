<!DOCTYPE html>
<html lang="vi">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Yêu cầu đăng nhập</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body class="bg-light">

<div class="container">

    <div class="row vh-100 justify-content-center align-items-center">

        <div class="col-md-6">

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- Header -->
                <div class="bg-primary text-white text-center p-5">

                    <i class="bi bi-lock-fill"
                       style="font-size: 70px;"></i>

                    <h2 class="fw-bold mt-3">
                        Bạn chưa đăng nhập
                    </h2>

                </div>

                <!-- Body -->
                <div class="card-body p-5 text-center">

                    <p class="text-muted fs-5 mb-4">
                        Vui lòng đăng nhập hoặc tạo tài khoản
                        để tiếp tục sử dụng hệ thống TEDDY EDU.
                    </p>

                    <div class="d-flex justify-content-center gap-3">

                        <a href="{% url 'accounts:login' %}"
                           class="btn btn-primary btn-lg rounded-pill px-4">

                            <i class="bi bi-box-arrow-in-right me-2"></i>
                            Đăng nhập

                        </a>

                        <a href="{% url 'accounts:register' %}"
                           class="btn btn-outline-primary btn-lg rounded-pill px-4">

                            <i class="bi bi-person-plus me-2"></i>
                            Đăng ký

                        </a>

                    </div>

                    <div class="mt-4">

                        <a href="{% url 'home' %}"
                           class="text-decoration-none">

                            ← Quay về trang chủ

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
