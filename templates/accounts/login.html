<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEDDY Learning</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font tiếng Việt đẹp -->

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body{
        font-family: 'Be Vietnam Pro', sans-serif;
        background: linear-gradient(to right, #6180db, #c66ae4);
    }

    .login-container{
        min-height: 100vh;
    }

    .login-card{
        width: 100%;
        max-width: 430px;
        border: none;
        border-radius: 20px;
        overflow: hidden;
    }

    .login-header{
        background: #ffffff;
        text-align: center;
        padding: 30px 20px 10px;
    }

    .login-header h2{
        font-weight: 700;
        color: #4e73df;
    }

    .form-control{
        border-radius: 12px;
        padding: 12px;
    }

    .btn-login{
        background: #4e73df;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
    }

    .btn-login:hover{
        background: #375ac2;
    }

    .register-link a{
        text-decoration: none;
        font-weight: 600;
        color: #6f42c1;
    }
</style>

<div class="container d-flex justify-content-center align-items-center login-container">
    <div class="card shadow-lg login-card">

        <div class="login-header">
            <h2>Đăng nhập</h2>
            <p class="text-muted">Chào mừng quay trở lại TEDDY</p>
        </div>

        <div class="card-body p-4">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Tên tài khoản</label>
                    <input type="text" name="username" class="form-control" placeholder="Nhập tên tài khoản">
                </div>

                <div class="mb-4">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu">
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-login">
                    Đăng nhập
                </button>
            </form>

            <div class="text-center mt-4 register-link">
                Chưa có tài khoản?
                <a href="{% url 'accounts:register' %}">Đăng ký ngay</a>
            </div>

        </div>
    </div>
</div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
