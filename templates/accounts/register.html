<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEDDY Learning</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icon -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font tiếng Việt đẹp -->
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

<style>
    body{
        font-family: 'Be Vietnam Pro', sans-serif;
        background: linear-gradient(to right, #61bcca, #31c18c);
    }

    .register-container{
        min-height: 100vh;
    }

    .register-card{
        width: 100%;
        max-width: 500px;
        border: none;
        border-radius: 20px;
        overflow: hidden;
    }

    .register-header{
        background: #ffffff;
        text-align: center;
        padding: 30px 20px 10px;
    }

    .register-header h2{
        font-weight: 700;
        color: #1cc88a;
    }

    .form-control,
    .form-select{
        border-radius: 12px;
        padding: 12px;
    }

    .btn-register{
        background: #1cc88a;
        border: none;
        border-radius: 12px;
        padding: 12px;
        font-weight: 600;
    }

    .btn-register:hover{
        background: #16a673;
    }

    .login-link a{
        text-decoration: none;
        font-weight: 600;
        color: #36b9cc;
    }
</style>
<body>
<div class="container d-flex justify-content-center align-items-center register-container">
    <div class="card shadow-lg register-card">

        <div class="register-header">
            <h2>Đăng ký tài khoản</h2>
            <p class="text-muted">Tạo tài khoản để sử dụng hệ thống</p>
        </div>

        <div class="card-body p-4">

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Tên tài khoản</label>
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Nhập tên tài khoản">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email"
                           name="email"
                           class="form-control"
                           placeholder="Nhập email">
                </div>

                <!-- ROLE -->
                <div class="mb-3">
                    <label class="form-label">Vai trò</label>

                    <select name="role" class="form-select">
                        <option value="student">Học sinh</option>
                        <option value="teacher">Giáo viên</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password"
                           name="password1"
                           class="form-control"
                           placeholder="Nhập mật khẩu">
                </div>

                <div class="mb-4">
                    <label class="form-label">Xác nhận mật khẩu</label>
                    <input type="password"
                           name="password2"
                           class="form-control"
                           placeholder="Nhập lại mật khẩu">
                </div>

                <button type="submit"
                        class="btn btn-success w-100 btn-register">
                    Đăng ký
                </button>
            </form>

            <div class="text-center mt-4 login-link">
                Đã có tài khoản?
                <a href="{% url 'accounts:login' %}">Đăng nhập</a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
