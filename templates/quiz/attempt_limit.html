{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card border-0 shadow-lg rounded-5 text-center">

                <div class="card-body p-5">

                    <div style="font-size:80px;">
                        🚫
                    </div>

                    <h2 class="fw-bold mt-4">
                        Đã hết lượt làm bài
                    </h2>

                    <p class="text-muted mt-3">
                        Bạn đã sử dụng hết số lượt làm bài cho đề:
                    </p>

                    <h4 class="fw-bold">
                        {{ quiz.title }}
                    </h4>

                    <a
                        href="{% url 'quiz:quiz_list' %}"
                        class="btn btn-primary btn-lg rounded-4 mt-4"
                    >
                        📚 Quay lại danh sách đề
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
